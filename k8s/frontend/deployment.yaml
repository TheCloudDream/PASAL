apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: pasal

spec:
  replicas: 1

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: frontend

          image: ghcr.io/theclouddream/pasal-frontend:97a4e8b9b22cdb80308e9504a31b6d6f252b09bc

          ports:
            - containerPort: 80
          
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            
            limits:
              cpu: "200m"
              memory: "128Mi"