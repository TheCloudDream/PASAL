services:
  backend:
    image: pasal-backend:dev
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile

    container_name: pasal-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - ../.env.docker

    depends_on:
      - postgres
      - redis
    networks:
      - pasal-network

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: pasal-frontend:dev
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile

    container_name: pasal-frontend

    restart: unless-stopped

    ports:
      - "3000:80"
    networks:
      - pasal-network

  postgres:
    image: postgres:17
    container_name: pasal-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: pasal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5436:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pasal-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: pasal-redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data
    networks:
      - pasal-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pasal-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
